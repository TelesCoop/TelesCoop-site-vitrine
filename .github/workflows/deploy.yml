name: Deploy to production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 42722 telescoop.fr >> ~/.ssh/known_hosts 2>/dev/null

      - name: Setup Ansible Vault key
        run: echo "${{ secrets.ANSIBLE_VAULT_KEY }}" > deploy/vault.key

      - name: Run Ansible playbook
        run: |
          cd deploy
          ansible-playbook frontend.yml --limit prod -e force_update=true
